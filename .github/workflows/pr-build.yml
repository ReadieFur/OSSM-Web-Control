name: PR Build Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile SCSS
        run: npm run build:scss

      - name: Compile TypeScript
        run: npm run build:ts

      - name: Copy static files
        run: |
          mkdir -p dist
          rsync -av src/ dist/ \
            --exclude='*.ts' \
            --exclude='*.d.ts' \
            --exclude='*.scss' \
            --exclude='*.map' \
            --exclude='SOURCE'

      - name: Verify build output exists
        run: test -d dist
